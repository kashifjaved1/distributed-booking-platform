apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: booking-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 8888
            - containerPort: 8889
          args: ["--config=/etc/otel-collector.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc
      volumes:
        - name: config
          configMap:
            name: otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: booking-platform
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8889
      targetPort: 8889
  selector:
    app: otel-collector
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: booking-platform
data:
  otel-collector.yml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch: { timeout: 1s, send_batch_size: 1024 }
      memory_limiter: { check_interval: 1s, limit_mib: 512 }
    exporters:
      otlp: { endpoint: jaeger:4317, tls: { insecure: true } }
      prometheus: { endpoint: 0.0.0.0:8889, namespace: booking_platform }
    service:
      pipelines:
        traces: { receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp] }
        metrics: { receivers: [otlp], processors: [memory_limiter, batch], exporters: [prometheus] }
